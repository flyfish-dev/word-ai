name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  python-dotnet:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Python checks
        run: |
          PYTHONPATH=. python -m compileall word_ai_mcp scripts
          PYTHONPATH=. python scripts/run_smoke_test.py
          PYTHONPATH=. python scripts/run_structure_regression.py

      - name: .NET checks
        run: |
          dotnet build dotnet/WordAi.OpenXml/WordAi.OpenXml.csproj -c Release
          PYTHONPATH=. python scripts/run_dotnet_regression.py

  office-addin:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: office-addin
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: office-addin/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Production dependency audit
        run: npm audit --omit=dev --registry=https://registry.npmjs.org --audit-level=high
