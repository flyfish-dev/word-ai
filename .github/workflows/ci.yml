name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  python-dotnet:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Python checks
        run: |
          PYTHONPATH=. python -m compileall word_ai_mcp scripts
          PYTHONPATH=. python scripts/run_smoke_test.py
          PYTHONPATH=. python scripts/run_structure_regression.py
          PYTHONPATH=. python scripts/run_outline_regression.py
          PYTHONPATH=. python scripts/run_word_session_smoke.py
          PYTHONPATH=. python scripts/validate_word_ai_skill.py
          PYTHONPATH=. python - <<'PY'
          from word_ai_mcp.server import WordAiMcpServer
          tools = {tool['name'] for tool in WordAiMcpServer(root='.').list_tools()}
          assert len(tools) == 63
          for name in ['officecli_view_html', 'officecli_view_screenshot', 'officecli_view_issues', 'officecli_query', 'officecli_validate']:
              assert name in tools
          print('tool surface validation passed')
          PY
          PYTHONPATH=. python -m word_ai_mcp.quickstart --root "$PWD" codex-config --output /tmp/word-ai-codex.toml
          python - <<'PY'
          import tomllib
          with open('/tmp/word-ai-codex.toml', 'rb') as fh:
              data = tomllib.load(fh)
          tools = data['mcp_servers']['word_ai']['tools']
          for name in ['docx_apply_patchset', 'word_session_apply_patchset', 'word_session_rollback', 'officecli_view_screenshot']:
              assert tools[name]['approval_mode'] == 'approve'
          print('codex config validation passed')
          PY

      - name: .NET checks
        run: |
          dotnet build dotnet/WordAi.OpenXml/WordAi.OpenXml.csproj -c Release
          PYTHONPATH=. python scripts/run_dotnet_regression.py
          PYTHONPATH=. python scripts/publish_native_backends.py linux-x64 --clean --json
          PYTHONPATH=. python scripts/verify_native_backends.py --require-rids linux-x64
          PYTHONPATH=. python scripts/build_mcpb.py --version 0.0.0-ci --out dist/word-ai-ci.mcpb
          python - <<'PY'
          import zipfile
          from pathlib import Path

          path = Path("dist/word-ai-ci.mcpb")
          with zipfile.ZipFile(path) as zf:
              names = set(zf.namelist())
          required = {
              "dist/native/linux-x64/WordAi.OpenXml",
              "README.md",
              "README.zh-CN.md",
              "docs/GETTING_STARTED.md",
              "docs/GETTING_STARTED.zh-CN.md",
          }
          missing = sorted(required - names)
          if missing:
              raise SystemExit(f"MCPB payload missing required files: {missing}")
          print("MCPB payload validation passed")
          PY

  office-addin:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: office-addin
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: office-addin/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Validate Office manifest
        run: npx office-addin-manifest validate manifest.xml

      - name: Production dependency audit
        run: npm audit --omit=dev --registry=https://registry.npmjs.org --audit-level=high
